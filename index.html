<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerQuest India - Professional Job Engine</title>
    <style>
        /* CSS: Professional Styling with Theme Variables */
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f3f4f6;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --card-bg: #ffffff;
            --border: #e5e7eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --transition: all 0.3s ease;
        }

        [data-theme="dark"] {
            --primary-color: #3b82f6;
            --primary-hover: #60a5fa;
            --bg-color: #111827;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --card-bg: #1f2937;
            --border: #374151;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            transition: var(--transition);
        }

        /* Typography & Globals */
        h1, h2, h3 { color: var(--text-main); }
        button { cursor: pointer; transition: var(--transition); font-family: inherit; }
        input, select { font-family: inherit; color: var(--text-main); background: var(--card-bg); }

        /* Navigation */
        header {
            background-color: var(--card-bg);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-color);
            cursor: pointer;
            letter-spacing: -0.5px;
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .nav-links { display: flex; gap: 1rem; align-items: center; }

        .nav-links button {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .nav-links button:hover { color: var(--primary-color); }

        .btn-primary {
            background-color: var(--primary-color) !important;
            color: #ffffff !important;
            padding: 0.5rem 1.25rem;
            border-radius: 6px;
            font-weight: 600;
            border: none;
        }

        .btn-primary:hover { background-color: var(--primary-hover) !important; }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 1.25rem;
            color: var(--text-main);
            padding: 0.5rem;
            border-radius: 50%;
        }
        .theme-toggle:hover { background: var(--bg-color); }

        /* Main Container */
        main {
            width: 90%;
            max-width: 1200px;
            margin: 2rem auto;
            min-height: 80vh;
        }

        .view {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        .view.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Search Section */
        .search-container {
            background: var(--card-bg);
            padding: 2.5rem 2rem;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
            text-align: center;
            border: 1px solid var(--border);
        }

        .search-container h1 { margin-bottom: 1.5rem; font-size: 2.25rem; }

        .search-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            max-width: 900px;
            margin: 0 auto;
        }

        .search-bar input, .search-bar select {
            flex: 1;
            min-width: 200px;
            padding: 0.8rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }
        .search-bar input:focus, .search-bar select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }

        /* Job Grid */
        .job-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .job-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .job-card:hover { transform: translateY(-4px); border-color: var(--primary-color); }

        .job-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
        }

        .job-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .save-btn {
            background: none;
            border: none;
            font-size: 1.25rem;
            color: var(--text-muted);
        }
        .save-btn.saved { color: var(--warning); }
        .save-btn:hover { transform: scale(1.1); }

        .job-company { font-weight: 600; margin-bottom: 0.5rem; }
        .job-details { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem; flex-grow: 1; }

        .job-tags { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .tag {
            background: var(--bg-color);
            padding: 0.35rem 0.75rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid var(--border);
        }

        .apply-btn {
            width: 100%;
            padding: 0.8rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
        }
        .apply-btn:disabled { background: var(--success); cursor: not-allowed; }

        /* Auth Forms */
        .auth-container {
            max-width: 420px;
            margin: 4rem auto;
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .auth-container h2 { text-align: center; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.9rem; }
        
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
        }
        .form-group input:focus { border-color: var(--primary-color); }

        .auth-btn {
            width: 100%;
            padding: 0.8rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 1rem;
        }

        /* Tracker Table */
        .dashboard-layout { display: flex; flex-direction: column; gap: 2rem; }
        
        .dashboard-section {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .table-responsive { overflow-x: auto; }
        
        .tracker-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        .tracker-table th, .tracker-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .tracker-table th { background-color: var(--bg-color); font-weight: 600; font-size: 0.9rem; }

        .status-select {
            padding: 0.4rem 0.8rem;
            border-radius: 99px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid var(--border);
            background-color: var(--bg-color);
            color: inherit;
            cursor: pointer;
            outline: none;
        }
        
        option[value="Under Review"] { color: var(--primary-color); }
        option[value="Interview"] { color: var(--warning); }
        option[value="Offer"] { color: var(--success); }
        option[value="Rejected"] { color: var(--danger); }

        /* Toast Notifications */
        #toastContainer {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            z-index: 1000;
        }

        .toast {
            background: var(--card-bg);
            color: var(--text-main);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-left: 4px solid var(--primary-color);
            animation: slideIn 0.3s ease-out forwards;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--danger); }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }

        @media (max-width: 768px) {
            .search-bar { flex-direction: column; }
            .nav-links { display: none; }
            header { padding: 1rem; }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <header>
        <div class="logo" onclick="switchView('home-view')">CareerQuest India.</div>
        <div class="nav-controls">
            <button class="theme-toggle" id="themeToggleBtn" onclick="toggleTheme()" title="Toggle Dark Mode">🌙</button>
            <nav class="nav-links" id="nav-links">
                <!-- Dynamically populated by JS based on Auth state -->
            </nav>
        </div>
    </header>

    <main>
        <!-- VIEW 1: Home / Job Search -->
        <section id="home-view" class="view active">
            <div class="search-container">
                <h1>Find Your Dream Job in India</h1>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Job title, keyword, or company..." onkeyup="searchJobs()">
                    <input type="text" id="locationInput" placeholder="Location (e.g., Bengaluru, Mumbai)..." onkeyup="searchJobs()">
                    <select id="typeInput" onchange="searchJobs()">
                        <option value="">All Job Types</option>
                        <option value="Full-Time">Full-Time</option>
                        <option value="Part-Time">Part-Time</option>
                        <option value="Contract">Contract</option>
                        <option value="Freelance">Freelance</option>
                    </select>
                    <button class="btn-primary" onclick="searchJobs()">Search</button>
                </div>
            </div>
            <div id="jobListings" class="job-grid">
                <!-- Jobs populated here by JS -->
            </div>
        </section>

        <!-- VIEW 2: Login / Register -->
        <section id="auth-view" class="view">
            <div class="auth-container">
                <h2 id="authTitle">Sign In</h2>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter username" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
                </div>
                <button class="auth-btn" id="authSubmitBtn" onclick="handleAuth()">Login</button>
                <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
                    <a href="#" onclick="toggleAuthMode(event)" style="color: var(--primary-color); text-decoration: none; font-weight: 500;">
                        Don't have an account? Register here.
                    </a>
                </p>
            </div>
        </section>

        <!-- VIEW 3: Dashboard -->
        <section id="dashboard-view" class="view">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2>My Dashboard</h2>
                <h3 id="welcomeUser" style="color: var(--text-muted); font-weight: 500;"></h3>
            </div>
            
            <div class="dashboard-layout">
                <!-- Applications Tracker -->
                <div class="dashboard-section">
                    <h3 style="margin-bottom: 1rem;">Tracked Applications</h3>
                    <div class="table-responsive">
                        <table class="tracker-table">
                            <thead>
                                <tr>
                                    <th>Company</th>
                                    <th>Role</th>
                                    <th>Date Applied</th>
                                    <th>Status (Updateable)</th>
                                </tr>
                            </thead>
                            <tbody id="trackerBody">
                                <!-- Tracked applications populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Saved Jobs -->
                <div class="dashboard-section">
                    <h3 style="margin-bottom: 1rem;">Saved Jobs</h3>
                    <div id="savedJobsGrid" class="job-grid" style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));">
                        <!-- Saved Jobs Populated Here -->
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Toast Notification Container -->
    <div id="toastContainer"></div>

    <!-- JavaScript Application Logic -->
    <script>
        // --- MOCK DATABASE (India Context: 22 Companies) ---
        const MOCK_JOBS = [
            { id: 1, title: "Senior Frontend Developer", company: "Tech Mahindra", location: "Remote", type: "Full-Time", salary: "₹15 LPA - ₹18 LPA", posted: "2d ago" },
            { id: 2, title: "Backend Systems Engineer", company: "Infosys", location: "Bengaluru, KA", type: "Full-Time", salary: "₹12 LPA - ₹16 LPA", posted: "5h ago" },
            { id: 3, title: "UI/UX Designer", company: "Zomato", location: "Gurugram, HR", type: "Contract", salary: "₹800/hr", posted: "1w ago" },
            { id: 4, title: "Product Manager", company: "Flipkart", location: "Bengaluru, KA", type: "Full-Time", salary: "₹25 LPA - ₹35 LPA", posted: "1d ago" },
            { id: 5, title: "Machine Learning Scientist", company: "TCS", location: "Pune, MH", type: "Full-Time", salary: "₹18 LPA - ₹24 LPA", posted: "3d ago" },
            { id: 6, title: "DevOps Consultant", company: "Wipro", location: "Hyderabad, TS", type: "Freelance", salary: "₹1,000/hr", posted: "12h ago" },
            { id: 7, title: "Junior Web Developer", company: "CRED", location: "Bengaluru, KA", type: "Part-Time", salary: "₹6 LPA - ₹8 LPA", posted: "Just now" },
            { id: 8, title: "Full Stack Developer", company: "Swiggy", location: "Bengaluru, KA", type: "Full-Time", salary: "₹20 LPA - ₹28 LPA", posted: "2h ago" },
            { id: 9, title: "Data Analyst", company: "Paytm", location: "Noida, UP", type: "Full-Time", salary: "₹10 LPA - ₹14 LPA", posted: "1d ago" },
            { id: 10, title: "Cloud Architect", company: "HCLTech", location: "Chennai, TN", type: "Full-Time", salary: "₹22 LPA - ₹30 LPA", posted: "4d ago" },
            { id: 11, title: "Mobile App Developer (iOS)", company: "Ola", location: "Bengaluru, KA", type: "Contract", salary: "₹15 LPA - ₹18 LPA", posted: "1w ago" },
            { id: 12, title: "Cybersecurity Analyst", company: "LTIMindtree", location: "Mumbai, MH", type: "Full-Time", salary: "₹12 LPA - ₹15 LPA", posted: "3h ago" },
            { id: 13, title: "Marketing Automation Specialist", company: "Zoho", location: "Chennai, TN", type: "Full-Time", salary: "₹8 LPA - ₹12 LPA", posted: "2w ago" },
            { id: 14, title: "Backend Developer (Python)", company: "Razorpay", location: "Remote", type: "Full-Time", salary: "₹25 LPA - ₹32 LPA", posted: "1d ago" },
            { id: 15, title: "QA Automation Engineer", company: "Freshworks", location: "Chennai, TN", type: "Full-Time", salary: "₹10 LPA - ₹14 LPA", posted: "5d ago" },
            { id: 16, title: "Engineering Manager", company: "Reliance Jio", location: "Navi Mumbai, MH", type: "Full-Time", salary: "₹35 LPA - ₹45 LPA", posted: "6h ago" },
            { id: 17, title: "Blockchain Developer", company: "CoinDCX", location: "Mumbai, MH", type: "Full-Time", salary: "₹24 LPA - ₹36 LPA", posted: "2d ago" },
            { id: 18, title: "Game Developer", company: "Dream11", location: "Mumbai, MH", type: "Full-Time", salary: "₹18 LPA - ₹26 LPA", posted: "1w ago" },
            { id: 19, title: "React Native Developer", company: "Myntra", location: "Bengaluru, KA", type: "Contract", salary: "₹1,200/hr", posted: "4h ago" },
            { id: 20, title: "Data Engineer", company: "Mu Sigma", location: "Bengaluru, KA", type: "Full-Time", salary: "₹14 LPA - ₹18 LPA", posted: "2d ago" },
            { id: 21, title: "AI/NLP Researcher", company: "Fractal Analytics", location: "Mumbai, MH", type: "Full-Time", salary: "₹20 LPA - ₹28 LPA", posted: "3d ago" },
            { id: 22, title: "HR Executive", company: "Tata Motors", location: "Pune, MH", type: "Part-Time", salary: "₹4 LPA - ₹6 LPA", posted: "Just now" }
        ];

        // --- STATE & UTILS ---
        let currentUser = null;
        let isLoginMode = true;

        const showToast = (message, type = 'success') => {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = type === 'success' ? `✅ ${message}` : `⚠️ ${message}`;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideOut 0.3s ease-in forwards';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        // --- THEME MANAGEMENT ---
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            document.getElementById('themeToggleBtn').innerText = newTheme === 'light' ? '🌙' : '☀️';
        }

        // --- INITIALIZATION ---
        window.onload = () => {
            // Restore Theme
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('themeToggleBtn').innerText = savedTheme === 'light' ? '🌙' : '☀️';

            // Restore User Session
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) currentUser = savedUser;

            updateNavbar();
            renderJobs(MOCK_JOBS);
        };

        // --- UI ROUTING ---
        function switchView(viewId) {
            document.querySelectorAll('.view').forEach(view => view.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            
            if (viewId === 'dashboard-view') {
                if (!currentUser) {
                    switchView('auth-view');
                    showToast('Please sign in to view your dashboard', 'error');
                    return;
                }
                document.getElementById('welcomeUser').innerText = `${currentUser}`;
                renderDashboard();
            }
        }

        function updateNavbar() {
            const navLinks = document.getElementById('nav-links');
            if (currentUser) {
                navLinks.innerHTML = `
                    <button onclick="switchView('home-view')">Find Jobs</button>
                    <button onclick="switchView('dashboard-view')">Dashboard</button>
                    <button class="btn-primary" onclick="logout()">Log Out</button>
                `;
            } else {
                navLinks.innerHTML = `
                    <button onclick="switchView('home-view')">Find Jobs</button>
                    <button class="btn-primary" onclick="switchView('auth-view')">Sign In</button>
                `;
            }
        }

        // --- AUTHENTICATION ---
        function toggleAuthMode(e) {
            e.preventDefault();
            isLoginMode = !isLoginMode;
            document.getElementById('authTitle').innerText = isLoginMode ? 'Sign In' : 'Create Account';
            document.getElementById('authSubmitBtn').innerText = isLoginMode ? 'Login' : 'Register';
            const toggleText = isLoginMode ? "Don't have an account? Register here." : "Already have an account? Sign in.";
            document.querySelector('.auth-container a').innerText = toggleText;
        }

        function handleAuth() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();

            if (!user || !pass) {
                showToast("Please fill in all fields.", "error");
                return;
            }

            let users = JSON.parse(localStorage.getItem('users')) || {};

            if (!isLoginMode) {
                // Register
                if (users[user]) {
                    showToast("Username already exists.", "error");
                    return;
                }
                users[user] = { password: pass, applications: [], saved: [] };
                localStorage.setItem('users', JSON.stringify(users));
                loginUser(user);
                showToast("Account created successfully!");
            } else {
                // Login
                if (users[user] && users[user].password === pass) {
                    loginUser(user);
                    showToast("Welcome back!");
                } else {
                    showToast("Invalid username or password.", "error");
                }
            }
        }

        function loginUser(username) {
            currentUser = username;
            localStorage.setItem('currentUser', username);
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            updateNavbar();
            switchView('dashboard-view');
            searchJobs(); // Re-render jobs to update UI states
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            updateNavbar();
            switchView('home-view');
            searchJobs();
            showToast("Logged out successfully");
        }

        // --- JOB LOGIC ---
        function searchJobs() {
            const searchKeyword = document.getElementById('searchInput').value.toLowerCase();
            const searchLocation = document.getElementById('locationInput').value.toLowerCase();
            const searchType = document.getElementById('typeInput').value;

            const filteredJobs = MOCK_JOBS.filter(job => {
                const matchesKeyword = job.title.toLowerCase().includes(searchKeyword) || job.company.toLowerCase().includes(searchKeyword);
                const matchesLocation = job.location.toLowerCase().includes(searchLocation);
                const matchesType = searchType === "" || job.type === searchType;
                return matchesKeyword && matchesLocation && matchesType;
            });

            renderJobs(filteredJobs);
        }

        function renderJobs(jobs, containerId = 'jobListings', isDashboard = false) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            if (jobs.length === 0) {
                container.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 2rem;">No jobs found.</p>`;
                return;
            }

            let appliedJobIds = [];
            let savedJobIds = [];
            
            if (currentUser) {
                const users = JSON.parse(localStorage.getItem('users'));
                const userData = users[currentUser];
                if(userData) {
                    appliedJobIds = userData.applications.map(app => app.jobId);
                    savedJobIds = userData.saved || [];
                }
            }

            jobs.forEach(job => {
                const isApplied = appliedJobIds.includes(job.id);
                const isSaved = savedJobIds.includes(job.id);
                
                const btnHtml = isApplied 
                    ? `<button class="apply-btn" disabled>Applied ✓</button>`
                    : `<button class="apply-btn" onclick="applyForJob(${job.id})">Apply Now</button>`;

                const saveIcon = isSaved ? '★' : '☆';
                const saveClass = isSaved ? 'save-btn saved' : 'save-btn';

                const card = document.createElement('div');
                card.className = 'job-card';
                card.innerHTML = `
                    <div class="job-header">
                        <div class="job-title">${job.title}</div>
                        <button class="${saveClass}" onclick="toggleSaveJob(${job.id})" title="Save Job">${saveIcon}</button>
                    </div>
                    <div class="job-company">${job.company}</div>
                    <div class="job-details">
                        📍 ${job.location} <br> 
                        💰 ${job.salary} <br>
                        ⏱️ ${job.posted}
                    </div>
                    <div class="job-tags">
                        <span class="tag">${job.type}</span>
                    </div>
                    ${!isDashboard ? btnHtml : ''} 
                `;
                container.appendChild(card);
            });
        }

        function applyForJob(jobId) {
            if (!currentUser) {
                showToast("Please sign in to apply.", "error");
                switchView('auth-view');
                return;
            }

            const users = JSON.parse(localStorage.getItem('users'));
            const job = MOCK_JOBS.find(j => j.id === jobId);
            
            users[currentUser].applications.push({
                id: Date.now(), 
                jobId: job.id,
                company: job.company,
                title: job.title,
                // Localized date formatting to Indian standard
                date: new Date().toLocaleDateString('en-IN'),
                status: 'Under Review'
            });

            localStorage.setItem('users', JSON.stringify(users));
            searchJobs(); 
            showToast(`Applied to ${job.company} successfully!`);
        }

        function toggleSaveJob(jobId) {
            if (!currentUser) {
                showToast("Sign in to save jobs.", "error");
                return;
            }

            const users = JSON.parse(localStorage.getItem('users'));
            if (!users[currentUser].saved) users[currentUser].saved = [];

            const savedIndex = users[currentUser].saved.indexOf(jobId);
            
            if (savedIndex > -1) {
                users[currentUser].saved.splice(savedIndex, 1);
                showToast("Job removed from saved items");
            } else {
                users[currentUser].saved.push(jobId);
                showToast("Job saved successfully!");
            }

            localStorage.setItem('users', JSON.stringify(users));
            
            if(document.getElementById('home-view').classList.contains('active')) {
                searchJobs();
            } else {
                renderDashboard();
            }
        }

        // --- DASHBOARD LOGIC ---
        function renderDashboard() {
            const users = JSON.parse(localStorage.getItem('users'));
            const userData = users[currentUser];
            
            // 1. Render Applications Table
            const trackerBody = document.getElementById('trackerBody');
            trackerBody.innerHTML = '';

            if (userData.applications.length === 0) {
                trackerBody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--text-muted);">No applications yet.</td></tr>';
            } else {
                const statuses = ["Under Review", "Interview", "Offer", "Rejected"];
                
                userData.applications.forEach(app => {
                    const row = document.createElement('tr');
                    
                    let optionsHtml = statuses.map(s => 
                        `<option value="${s}" ${app.status === s ? 'selected' : ''}>${s}</option>`
                    ).join('');

                    row.innerHTML = `
                        <td style="font-weight: 600;">${app.company}</td>
                        <td>${app.title}</td>
                        <td>${app.date}</td>
                        <td>
                            <select class="status-select" onchange="updateAppStatus(${app.id}, this.value)">
                                ${optionsHtml}
                            </select>
                        </td>
                    `;
                    trackerBody.appendChild(row);
                });
            }

            // 2. Render Saved Jobs
            const savedJobs = (userData.saved || []).map(id => MOCK_JOBS.find(j => j.id === id)).filter(Boolean);
            renderJobs(savedJobs, 'savedJobsGrid', true);
        }

        function updateAppStatus(appId, newStatus) {
            const users = JSON.parse(localStorage.getItem('users'));
            const app = users[currentUser].applications.find(a => a.id === appId);
            if (app) {
                app.status = newStatus;
                localStorage.setItem('users', JSON.stringify(users));
                showToast(`Status updated to ${newStatus}`);
            }
        }
    </script>
</body>
</html>
